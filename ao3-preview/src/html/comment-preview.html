<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AO3 Comment Preview</title>
  <link rel="stylesheet" href="vendor/ao3-screen.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/comment-preview.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css">
</head>
<body>

<div id="toolbar" class="toolbar">
  <a href="preview.html">&larr; chapter preview</a>
  <span class="sep">|</span>
  <span>comment preview</span>
  <span id="sanitized-badge">sanitized</span>
  <button id="dark-toggle" class="toolbar-btn toolbar-spacer">&#9790; Dark</button>
</div>

<div id="panes">

  <div id="input-pane">
    <div id="input-label">
      <span>Editor</span>
      <div class="pane-label-actions">
        <button id="copy-html-btn" class="pane-clear-btn">Copy HTML</button>
        <button id="clear-btn" class="pane-clear-btn">Clear</button>
      </div>
    </div>
    <div id="quill-editor"></div>
    <div id="warning-bar"></div>
  </div>

  <div id="preview-pane">
    <div id="preview-label">
      <div id="preview-tabs">
        <button class="preview-tab active" data-tab="preview">Preview</button>
        <button class="preview-tab" data-tab="source">Source</button>
      </div>
    </div>
    <div id="preview-scroll">
      <div id="fake-comment" class="comment">
        <h4 class="byline">
          ninineen
          <span class="role">(Author)</span>
        </h4>
        <div id="comment-content" class="userstuff"></div>
        <div class="actions">
          <a href="#">Reply</a>
          <a href="#">Edit</a>
          <a href="#">Delete</a>
        </div>
      </div>
    </div>
    <textarea id="source-input" spellcheck="false" placeholder="Type or paste HTML here…"></textarea>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script type="module" src="js/comment-preview.js"></script>
</body>
</html>
